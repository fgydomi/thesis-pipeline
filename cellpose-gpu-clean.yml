# Reproducible GPU environment for Cellpose-based inference on Windows.
# After creating the environment, install the local project with:
# pip install -e .

name: cellpose-gpu-clean
channels:
  - conda-forge
  - defaults
dependencies:
  - bzip2=1.0.8
  - ca-certificates=2026.2.25
  - libexpat=2.7.5
  - libffi=3.5.2
  - liblzma=5.8.2
  - libsqlite=3.52.0
  - libzlib=1.3.2
  - openssl=3.6.1
  - packaging=26.0
  - pip=26.0.1
  - python=3.10.20
  - setuptools=82.0.1
  - tk=8.6.13
  - ucrt=10.0.26100.0
  - vc=14.3
  - vc14_runtime=14.44.35208
  - vcomp14=14.44.35208
  - wheel=0.46.3
  - pip:
      - cellpose==4.1.1
      - colorama==0.4.6
      - fastremap==1.18.0
      - filelock==3.25.2
      - fill-voids==2.1.1
      - fsspec==2026.2.0
      - imagecodecs==2025.3.30
      - jinja2==3.1.6
      - lxml==6.0.2
      - markupsafe==3.0.3
      - mpmath==1.3.0
      - natsort==8.4.0
      - networkx==3.4.2
      - numpy==2.2.6
      - opencv-python-headless==4.13.0.92
      - pandas==2.3.3
      - pillow==12.1.1
      - python-dateutil==2.9.0.post0
      - pytz==2026.1.post1
      - pyyaml==6.0.3
      - roifile==2025.12.12
      - scipy==1.15.3
      - segment-anything==1.0
      - six==1.17.0
      - sympy==1.14.0
      - tifffile==2025.5.10
      - torch==2.7.1+cu118
      - torchaudio==2.7.1+cu118
      - torchvision==0.22.1+cu118
      - tqdm==4.67.3
      - typing-extensions==4.15.0
      - tzdata==2026.1
